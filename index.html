<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Kəşfiyyatçısı - 12 Həftəlik Kurs</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --warn: #f59e0b;
            --locked: #cbd5e1;
            --radius: 14px;
            --shadow: 0 10px 20px rgba(15, 23, 42, 0.06);
            --focus: #eff6ff;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        #app {
            max-width: 840px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-bottom: 14px;
        }
        .fade-in {
            animation: fadeIn 0.35s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .row { display: flex; gap: 10px; align-items: center; }
        .space { justify-content: space-between; }
        .stack { display: grid; gap: 10px; }
        .muted { color: var(--muted); }
        .small { font-size: 13px; }
        .title { margin: 0 0 6px; font-size: 25px; }
        .subtitle { margin: 0; color: var(--muted); }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            min-height: 44px;
            cursor: pointer;
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            transition: 0.2s ease;
        }
        .btn:hover { background: var(--primary-hover); }
        .btn.secondary { background: #475569; }
        .btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn.success { background: #059669; }
        .btn.warn { background: #b45309; }
        .btn:disabled { background: var(--locked); cursor: not-allowed; }
        .btn.inline { width: auto; }
        .btn:focus-visible,
        .task:focus-visible,
        .week-card:focus-visible,
        a:focus-visible,
        input:focus-visible,
        textarea:focus-visible,
        select:focus-visible {
            outline: 3px solid #1d4ed8;
            outline-offset: 2px;
        }

        .progress {
            width: 100%;
            height: 12px;
            border-radius: 999px;
            background: #e5e7eb;
            overflow: hidden;
        }
        .progress > div {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #059669, #34d399);
            transition: width 0.4s ease;
        }

        .weeks {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 10px;
        }
        .week-card {
            border: 1px solid var(--border);
            border-left: 6px solid var(--primary);
            border-radius: 12px;
            padding: 12px;
            background: #fff;
            cursor: pointer;
        }
        .week-card:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08); }
        .week-card.locked {
            border-left-color: var(--locked);
            opacity: 0.65;
            cursor: not-allowed;
        }

        .task {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            min-height: 44px;
            background: #fff;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
        }
        .task:hover { transform: translateY(-1px); border-color: #93c5fd; box-shadow: 0 6px 14px rgba(15, 23, 42, 0.06); }
        .task.mini { background: var(--focus); }
        .task.done { background: #ecfdf5; border-color: var(--success); }
        .task .check {
            width: 22px; height: 22px; border-radius: 6px;
            border: 2px solid var(--locked);
            display: grid; place-items: center;
            font-weight: bold;
        }
        .task.done .check { background: var(--success); color: #fff; border-color: var(--success); }
        .task.done .text { text-decoration: line-through; color: #047857; }

        textarea, input[type="text"], select {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            font-size: 14px;
            font-family: inherit;
        }
        textarea { min-height: 120px; resize: vertical; }

        .badge {
            border-radius: 999px;
            padding: 3px 8px;
            font-size: 12px;
            font-weight: 600;
            background: #dbeafe;
            color: #1d4ed8;
        }
        .badge.warn { background: #fef3c7; color: #b45309; }
        .save-indicator { color: #059669; font-size: 12px; min-height: 16px; }
        .notice {
            border-left: 4px solid var(--primary);
            background: var(--focus);
            border-radius: 10px;
            padding: 10px;
            font-size: 13px;
            color: #1e3a8a;
        }
        .pill {
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 12px;
            color: var(--muted);
        }
        #toast {
            position: fixed;
            right: 14px;
            bottom: 14px;
            max-width: 360px;
            background: #0f172a;
            color: #fff;
            padding: 10px 12px;
            border-radius: 10px;
            box-shadow: 0 14px 24px rgba(2, 6, 23, 0.35);
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
            transition: opacity 0.22s ease, transform 0.22s ease;
            z-index: 9999;
            font-size: 13px;
        }
        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .celebration {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 9998;
        }
        .confetti {
            position: absolute;
            top: -20px;
            width: 10px;
            height: 16px;
            border-radius: 3px;
            animation: fall 1100ms linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(540deg); opacity: 0.5; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
                scroll-behavior: auto !important;
            }
        }

        @media (max-width: 520px) {
            .title { font-size: 22px; }
            .row.wrap { flex-wrap: wrap; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    function getTodayIsoDate() {
        return new Date().toISOString().slice(0, 10);
    }

    function getInitialState() {
        return {
            version: "1.0",
            student: {
                name: "",
                avatar: "🚀",
                age: 10,
                startDate: getTodayIsoDate(),
                lastVisit: new Date().toISOString()
            },
            progress: {
                completedTasks: [],
                weekProgress: {},
                currentWeek: 0,
                unlockedWeeks: [0]
            },
            reflections: {},
            fatherCheckins: {},
            project: {
                selectedTemplate: "",
                notes: ""
            },
            settings: {
                fontSize: "normal",
                highContrast: false,
                autoSave: true
            }
        };
    }

    function safeParse(jsonText) {
        try { return JSON.parse(jsonText); } catch (e) { return null; }
    }

    function escapeHtml(value) {
        return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function mergeState(base, incoming) {
        if (!incoming || typeof incoming !== "object") return base;
        return {
            ...base,
            ...incoming,
            student: { ...base.student, ...(incoming.student || {}) },
            progress: { ...base.progress, ...(incoming.progress || {}) },
            reflections: { ...base.reflections, ...(incoming.reflections || {}) },
            fatherCheckins: { ...base.fatherCheckins, ...(incoming.fatherCheckins || {}) },
            project: { ...base.project, ...(incoming.project || {}) },
            settings: { ...base.settings, ...(incoming.settings || {}) }
        };
    }

    function getReflectionMin() {
        return state.student.age <= 10 ? 30 : DEFAULT_MIN_REFLECTION;
    }

    function getLearnerLevel() {
        if (state.student.age <= 9) return "Junior Explorer";
        if (state.student.age <= 11) return "Explorer";
        return "Pro Explorer";
    }

    function getUiProfile() {
        if (state.student.age <= 9) {
            return {
                minutes: 15,
                tips: "Kiçik addım + çox təkrar = güclü nəticə.",
                focus: "#fff7ed"
            };
        }
        if (state.student.age <= 11) {
            return {
                minutes: 20,
                tips: "Tapşırığı hissələrə böl, sonra bir-bir bitir.",
                focus: "#eff6ff"
            };
        }
        return {
            minutes: 25,
            tips: "Planla, sınaq et, düzəlt — bu peşəkar yanaşmadır.",
            focus: "#eef2ff"
        };
    }

    function getDailyQuest() {
        const currentWeek = state.progress.currentWeek;
        const week = COURSE[currentWeek];
        if (!week) return "Bu gün 10 dəqiqə öyrən və 1 fikir yaz.";
        const firstOpenTask = week.tasks.find((t) => !state.progress.completedTasks.includes(t.id));
        if (firstOpenTask) return "Missiya: " + firstOpenTask.text;
        return "Missiya: Reflection bölməsinə 2-3 cümlə yaz və saxla.";
    }

    function getBadges() {
        const badges = [];
        const completedWeeks = Object.keys(COURSE).filter((wk) => (state.progress.weekProgress[Number(wk)] || 0) >= 70).length;
        const aiWeek = (state.progress.weekProgress[7] || 0) >= 70 || (state.progress.weekProgress[8] || 0) >= 70;
        const projectWeek = (state.progress.weekProgress[9] || 0) >= 70 || (state.progress.weekProgress[10] || 0) >= 70;
        if (completedWeeks >= 1) badges.push("🌱 İlk Addım");
        if (completedWeeks >= 4) badges.push("🧩 Scratch Ustası");
        if (aiWeek) badges.push("🤖 AI Kəşfiyyatçısı");
        if (projectWeek) badges.push("🏗️ Layihə Qurucusu");
        if (completedWeeks >= 10) badges.push("🚀 Davamlı Öyrənən");
        if (state.project.selectedTemplate) badges.push("🧪 Layihə Seçimi Edildi");
        return badges;
    }

    function getSelectedProjectTitle() {
        const selected = PROJECT_OPTIONS.find((p) => p.id === state.project.selectedTemplate);
        return selected ? selected.title : "Seçilməyib";
    }

    function getWeekSummary(weekId) {
        const week = COURSE[weekId];
        if (!week) return null;
        const doneTasks = week.tasks.filter((t) => state.progress.completedTasks.includes(t.id)).length;
        const totalTasks = week.tasks.length;
        const reflectionLen = (state.reflections[weekId] || "").trim().length;
        const checks = state.fatherCheckins["week" + weekId] || {};
        const checksDone = Object.values(checks).filter(Boolean).length;
        const progress = state.progress.weekProgress[weekId] || 0;
        let recommendation = "Möhtəşəm ritm! Bu həftə eyni qaydada davam edin.";
        if (progress < 40) recommendation = "Yükü azaldın: bu həftə yalnız 1 missiya + qısa reflection edin.";
        else if (progress < 70) recommendation = "Məqsəd 70%-dir: bir missiya və reflection əlavə edin.";
        return { doneTasks, totalTasks, reflectionLen, checksDone, progress, recommendation };
    }

    function getSessionState() {
        const total = getUiProfile().minutes * 60;
        if (!state.settings.session || typeof state.settings.session !== "object") {
            state.settings.session = { running: false, left: total, lastStart: null };
        }
        if (typeof state.settings.session.left !== "number" || state.settings.session.left <= 0) {
            state.settings.session.left = total;
        }
        return state.settings.session;
    }

    function formatSeconds(sec) {
        const m = Math.floor(sec / 60).toString().padStart(2, "0");
        const s = Math.floor(sec % 60).toString().padStart(2, "0");
        return m + ":" + s;
    }

    function startFocusSession() {
        const session = getSessionState();
        if (session.running) return;
        session.running = true;
        session.lastStart = Date.now();
        clearInterval(sessionTimer);
        sessionTimer = setInterval(() => {
            const s = getSessionState();
            if (!s.running) return;
            s.left = Math.max(0, s.left - 1);
            const timerEl = document.getElementById("sessionTimerText");
            if (timerEl) timerEl.textContent = formatSeconds(s.left);
            if (s.left === 0) {
                s.running = false;
                clearInterval(sessionTimer);
                setSaveIndicator("Əla! Fokus sessiyası bitdi. 3 dəq fasilə et.");
                celebrate("Sessiya tamamlandı! 3 dəq fasilə vaxtı ⏸️");
            }
        }, 1000);
        autosave();
        render();
    }

    function stopFocusSession() {
        const session = getSessionState();
        session.running = false;
        clearInterval(sessionTimer);
        autosave();
        render();
    }

    function resetFocusSession() {
        const total = getUiProfile().minutes * 60;
        const session = getSessionState();
        session.running = false;
        session.left = total;
        clearInterval(sessionTimer);
        autosave();
        render();
    }

        notify._timer = window.setTimeout(() => t.classList.remove("show"), 2100);
    }

    function celebrate(message) {

    function weekTasks(weekId) {
        return COURSE[weekId]?.tasks || [];
    }

    function calculateWeekProgress(weekId) {
        const tasks = weekTasks(weekId);
        if (!tasks.length) return 0;
        const doneCount = tasks.filter((t) => state.progress.completedTasks.includes(t.id)).length;
        const reflection = (state.reflections[weekId] || "").trim();
        const reflectionDone = reflection.length >= getReflectionMin() ? 1 : 0;
        const total = tasks.length + 1;
        return Math.round(((doneCount + reflectionDone) / total) * 100);
    }

    function refreshAllWeekProgress() {
        Object.keys(COURSE).forEach((wk) => {
            const w = Number(wk);
            state.progress.weekProgress[w] = calculateWeekProgress(w);
        });
    }

    function canAccessWeek(weekId) {
        if (weekId === 0) return true;
        if (state.progress.unlockedWeeks.includes(weekId)) return true;
        const prev = weekId - 1;
        return (state.progress.weekProgress[prev] || 0) >= 70;
    }

    function unlockByRule() {
        Object.keys(COURSE).forEach((wk) => {
            const weekId = Number(wk);
            if ((state.progress.weekProgress[weekId] || 0) >= 70) {
                const next = weekId + 1;
                if (COURSE[next] && !state.progress.unlockedWeeks.includes(next)) {
                    state.progress.unlockedWeeks.push(next);
                }
            }
        });
        state.progress.unlockedWeeks = Array.from(new Set(state.progress.unlockedWeeks)).sort((a, b) => a - b);
        const open = state.progress.unlockedWeeks[state.progress.unlockedWeeks.length - 1] || 0;
        state.progress.currentWeek = Math.min(open, 12);
    }

    function toggleTask(taskId, weekId) {
        if (!canAccessWeek(weekId)) return;
        const prevPct = state.progress.weekProgress[weekId] || 0;
        const idx = state.progress.completedTasks.indexOf(taskId);
        if (idx >= 0) state.progress.completedTasks.splice(idx, 1);
        else state.progress.completedTasks.push(taskId);
        refreshAllWeekProgress();
        unlockByRule();
        const isNowDone = state.progress.completedTasks.includes(taskId);
        const newPct = state.progress.weekProgress[weekId] || 0;
        autosave();
        if (isNowDone) setSaveIndicator("Mükəmməl! Bir missiya tamamlandı ✅");
        if (prevPct < 70 && newPct >= 70) celebrate("Yeni həftə açıldı! Əla iş 🚀");
        else if (prevPct < 100 && newPct === 100) celebrate("Həftə 100% tamamlandı! 🎉");
        renderWeek(weekId);
    }

    function saveReflection(weekId, value) {
        const prevPct = state.progress.weekProgress[weekId] || 0;

    }

    function importDataFromInput(input) {
        const file = input.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            const parsed = safeParse(String(reader.result || ""));
            if (!parsed) return notify("Fayl formatı düzgün deyil.");
            if (!parsed.student || !parsed.progress || !Array.isArray(parsed.progress.completedTasks)) {
                return notify("Backup strukturu düzgün deyil.");
            }
            state = mergeState(getInitialState(), parsed);
            refreshAllWeekProgress();
            unlockByRule();
            persistNow("Backup yükləndi.");
            navigate("dashboard");
        };
        reader.readAsText(file);
    }

                <h2 style="margin:0;">👨 Ata Dəstək Paneli</h2>

                <ul class="small muted" style="margin:0; padding-left:18px;">
                    <li>Tamamlanan həftələr: ${completedWeeks} / ${Object.keys(COURSE).length}</li>
                    <li>Son giriş: ${new Date(state.student.lastVisit).toLocaleString("az-AZ")}</li>
                    <li>Bu həftə reflection: ${reflectionDone ? "Bəli" : "Xeyr"}</li>
                </ul>
            </div>

            <div class="card stack">
                <h3 style="margin:0;">📊 Weekly Summary (Həftə ${current})</h3>
                <div class="row wrap">
                    <span class="pill">Tapşırıq: ${summary?.doneTasks || 0}/${summary?.totalTasks || 0}</span>
                    <span class="pill">Reflection: ${summary?.reflectionLen || 0} simvol</span>
                    <span class="pill">Yoxlama: ${summary?.checksDone || 0}/4</span>
                    <span class="pill">Progress: ${summary?.progress || 0}%</span>
                </div>
                <div class="notice">${summary?.recommendation || "Məlumat yoxdur."}</div>
            </div>

            <div class="card stack">
                <h3 style="margin:0;">Bu həftəlik yoxlama siyahısı (Həftə ${current})</h3>
                ${[
                    { key: "talked", label: "Oğlunuzla 15 dəqiqə danışdınız?" },
                    { key: "reviewed", label: "Layihəsinə baxdınız?" },
                    { key: "helped", label: "Texniki kömək lazım oldumu?" },
                    { key: "readReflection", label: "Reflection yazısını oxudunuz?" }
                ].map((item) => `
                    <label class="task ${checks[item.key] ? "done" : ""}" style="cursor:default;">
                        <input type="checkbox" ${checks[item.key] ? "checked" : ""} onchange="setFatherCheck(${current}, '${item.key}', this.checked); this.parentElement.classList.toggle('done', this.checked);" />
                        <span>${item.label}</span>
                    </label>
                `).join("")}
                <button class="btn" onclick="persistNow('Yoxlama saxlanıldı.')">Yoxlamanı Saxla</button>
                <p class="small muted">Tövsiyə: "Nəyi başa düşdün?" sualı motivasiyanı artırır.</p>
            </div>

            <div class="card stack">
                <h3 style="margin:0;">💾 Backup</h3>
                <div class="row wrap">
                    <button class="btn success" onclick="exportData()">Nəticələri Yüklə (.json)</button>
                    <label class="btn warn" style="display:inline-flex; align-items:center; justify-content:center;">
                        Backup Yüklə
                        <input type="file" accept="application/json" style="display:none;" onchange="importDataFromInput(this)" />
                    </label>
                </div>
            </div>

            <div class="card stack">
                <h3 style="margin:0;">🎓 Sertifikat</h3>
                <p class="small muted">Bütün həftələrdə ən az 70% tamamlandıqda aktiv olur.</p>
                <button class="btn" onclick="createCertificate()" ${canCert ? "" : "disabled"}>VOLAURA APP Sertifikatı</button>
            </div>

            <div class="card stack">
                <h3 style="margin:0;">👤 Müəllif</h3>
                <p class="small muted">Müəllif: Yusif (ganbaroff)</p>
                <a href="https://www.linkedin.com/in/yusif-ganbarov-pmp-9b3b66194/" target="_blank" rel="noopener noreferrer">LinkedIn: yusif-ganbarov-pmp-9b3b66194</a>
                <p class="small muted">Bu kimi layihələrin davam etməsi üçün müəllifi dəstəkləyə bilərsiniz. Məbləğ vacib deyil.</p>
                <p class="small muted">Dəstək birbaşa müəllifin AI modelləri və təhsil layihələrinin inkişafına yönəlir.</p>
                <p class="small muted">Təklif və əməkdaşlıq üçün LinkedIn üzərindən yaza bilərsiniz.</p>
            </div>
            </div>
        `;
    }

    function applyAppearance() {
        document.body.style.fontSize = state.settings.fontSize === "large" ? "18px" : "16px";
        const profile = getUiProfile();
        document.documentElement.style.setProperty("--focus", profile.focus);
        if (state.settings.highContrast) {
            document.documentElement.style.setProperty("--bg", "#ffffff");
            document.documentElement.style.setProperty("--text", "#000000");
            document.documentElement.style.setProperty("--muted", "#1f2937");
            document.documentElement.style.setProperty("--border", "#111827");
        } else {
            document.documentElement.style.setProperty("--bg", "#f8fafc");
            document.documentElement.style.setProperty("--text", "#0f172a");
            document.documentElement.style.setProperty("--muted", "#64748b");
            document.documentElement.style.setProperty("--border", "#e2e8f0");
        }
    }

    function renderSettings() {
        app.innerHTML = `
            <div class="fade-in">
            ${header()}
            <div class="card stack">
                <h2 style="margin:0;">⚙️ Ayarlar</h2>
                <label class="small muted">Yaş profili (8-12)</label>
                <select id="ageInputSettings">
                    ${AGE_OPTIONS.map((age) => `<option value="${age}" ${state.student.age === age ? "selected" : ""}>${age} yaş</option>`).join("")}
                </select>
                <label class="small muted">Yazı ölçüsü</label>
                <select id="fontSizeSelect">
                    <option value="normal" ${state.settings.fontSize === "normal" ? "selected" : ""}>Normal</option>
                    <option value="large" ${state.settings.fontSize === "large" ? "selected" : ""}>Böyük</option>
                </select>
                <label><input id="contrastInput" type="checkbox" ${state.settings.highContrast ? "checked" : ""} /> Yüksək kontrast</label>
                <label><input id="autosaveInput" type="checkbox" ${state.settings.autoSave ? "checked" : ""} /> Avtomatik saxla</label>
                <div class="row wrap">
                    <button class="btn inline" onclick="applySettings()">Saxla</button>
                    <button class="btn warn inline" onclick="resetProgress()">Proqresi sıfırla</button>
                </div>
            </div>
            </div>
        `;
    }

    function renderAbout() {
        app.innerHTML = `
            <div class="fade-in">
            ${header()}
            <div class="card stack">
                <h2 style="margin:0;">ℹ️ Platforma haqqında</h2>
                <p class="small muted">VOLAURA APP: IT Kəşfiyyatçısı 8-12 yaş uşaqlar üçün mərhələli AI və rəqəmsal savadlılıq platformasıdır.</p>
                <ul class="small muted" style="margin:0; padding-left:18px;">
                    <li>Model: təhlükəsiz gamifikasiya (yarış və təzyiqsiz).</li>
                    <li>Məqsəd: uşağın AI-ni anlaması, düzgün sual verməsi və nəticəni yoxlaması.</li>
                    <li>İstifadə: bir cihaz üçün optimallaşdırılıb, offline işləyir.</li>
                    <li>Dil: sadə Azərbaycan dili, yaşa uyğun təqdimat.</li>
                </ul>
                <p class="small muted">Bu versiya MVP+ mərhələsindədir və davamlı inkişaf etdirilir.</p>
            </div>
            <div class="card stack">
                <h3 style="margin:0;">🎯 Məhsul prinsipləri</h3>
                <ul class="small muted" style="margin:0; padding-left:18px;">
                    <li>Dürüstlük: manipulyativ satış və məcburi abunə yoxdur.</li>
                    <li>Uşaq mərkəzli dizayn: qısa sessiyalar, aydın tapşırıqlar.</li>
                    <li>Valideyn dəstəyi: həftəlik xülasə və müşahidə alətləri.</li>
                </ul>
            </div>
            </div>
        `;
    }

    function renderPolicy() {
        app.innerHTML = `
            <div class="fade-in">
            ${header()}
            <div class="card stack">
                <h2 style="margin:0;">🛡️ Təhlükəsizlik və Məxfilik</h2>
                <p class="small muted">Bu platformada məlumatlar əsasən cihazın brauzerində (localStorage) saxlanılır.</p>
                <ul class="small muted" style="margin:0; padding-left:18px;">
                    <li>Serverə şəxsi məlumat göndərilmir (mövcud versiyada backend yoxdur).</li>
                    <li>İstifadəçi istənilən vaxt “Proqresi sıfırla” ilə məlumatı silə bilər.</li>
                    <li>AI cavabları alət xarakterlidir, mütləq yoxlanmalıdır.</li>
                    <li>Valideyn nəzarəti və müzakirə tövsiyə olunur.</li>
                </ul>
            </div>
            <div class="card stack">
                <h3 style="margin:0;">👨 Valideyn üçün qeydlər</h3>
                <ul class="small muted" style="margin:0; padding-left:18px;">
                    <li>Həftədə ən az 1 dəfə 10-15 dəqiqə övladınızla öyrəndiklərini müzakirə edin.</li>
                    <li>"Niyə etmədin?" əvəzinə "Nə başa düşdün?" sualını verin.</li>
                    <li>Şübhəli AI cavablarında birgə fakt yoxlaması edin.</li>
                </ul>
            </div>
            </div>
        `;
    }

    function render() {
        state.student.lastVisit = new Date().toISOString();
        applyAppearance();
        if (!state.student.name) return renderOnboarding();
        if (router.view === "week") return renderWeek(router.weekId);
        if (router.view === "father") return renderFatherPanel();
        if (router.view === "settings") return renderSettings();
        if (router.view === "about") return renderAbout();
        if (router.view === "policy") return renderPolicy();
        return renderDashboard();
    }

    window.navigate = navigate;
    window.onboardingSubmit = onboardingSubmit;
    window.toggleTask = toggleTask;
    window.saveReflection = saveReflection;
    window.openGeminiPrompt = openGeminiPrompt;
    window.copyPrompt = copyPrompt;
    window.exportData = exportData;
    window.importDataFromInput = importDataFromInput;
    window.setFatherCheck = setFatherCheck;
    window.persistNow = persistNow;
    window.createCertificate = createCertificate;
    window.showHelp = showHelp;
    window.applySettings = applySettings;
    window.resetProgress = resetProgress;
    window.chooseProjectTemplate = chooseProjectTemplate;
    window.saveProjectNote = saveProjectNote;
    window.startFocusSession = startFocusSession;
    window.stopFocusSession = stopFocusSession;
    window.resetFocusSession = resetFocusSession;

    refreshAllWeekProgress();
    unlockByRule();
    render();

    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
    }
</script>
</body>
</html>
